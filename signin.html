<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InteriorHub - Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f5efe8] flex items-center justify-center min-h-screen p-4 font-sans text-[#2b2b2b] leading-relaxed">

    <div class="bg-white rounded-2xl shadow-2xl flex flex-col md:flex-row max-w-5xl w-full overflow-hidden">
        
        
        <div class="hidden md:block md:w-1/2 bg-[#d4c5b2]">
            <img src="./img/images1.jpg"
                 alt="Interior Design"
                 class="w-full h-full object-cover" />
        </div>

        
        <div class="w-full md:w-1/2 p-8 md:p-10">
            
            <div class="mb-6">
                <h1 class="text-2xl font-bold text-[#8b6f4c]"></h1>
            </div>

            <h2 class="text-2xl md:text-3xl font-bold text-[#2b2b2b] mb-2">idhula interior name vakkalam</h2>
            <p class="text-gray-500 mb-6">Sign in to your interior design account</p>

            <form>
                <div class="mb-4">
                    <label class="block text-[#2b2b2b] font-medium mb-1 text-sm">Email Address</label>
                    <input type="email"
                           placeholder="you@example.com"
                           class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#c4a484] focus:border-transparent bg-[#faf8f6]" />
                </div>

                <div class="mb-4">
                    <label class="block text-[#2b2b2b] font-medium mb-1 text-sm">Password</label>
                    <input type="password"
                           placeholder="••••••••"
                           class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#c4a484] focus:border-transparent bg-[#faf8f6]" />
                </div>

                <div class="flex items-center justify-between mb-6">
                    <label class="flex items-center text-sm text-gray-600">
                        <input type="checkbox" class="mr-2" /> Show Password
                    </label>
                    <a href="#" class="text-sm text-[#8b6f4c] hover:underline">Forgot password?</a>
                </div>

                <button type="submit"
                        class="w-full bg-[#8b6f4c] text-white py-3 rounded-lg hover:bg-[#6d5639] transition duration-200 font-medium text-lg">
                    Sign In
                </button>
            </form>

            <p class="text-center text-gray-500 mt-6 text-sm">
                Don't have an account?
                <a href="signup.html" class="text-[#8b6f4c] hover:underline font-medium">Sign Up</a>
            </p>
        </div>
    </div>
    <script src="signin.js"></script>

</body>
</html>
